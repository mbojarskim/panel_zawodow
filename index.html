		<script>
		// ==================== KONFIGURACJA FIREBASE ====================
		const firebaseConfig = {
			apiKey: "AIzaSyD2HMHEDyZ6jrUHwjv8wDaxd7swi9rtn2k",
			authDomain: "zawodylekkoatletyczne.firebaseapp.com",
			databaseURL: "https://zawodylekkoatletyczne-default-rtdb.firebaseio.com",
			projectId: "zawodylekkoatletyczne",
			storageBucket: "zawodylekkoatletyczne.firebasestorage.app",
			messagingSenderId: "812081786407",
			appId: "1:812081786407:web:7f820e436490693a9d2802"
		};

		let database, auth;
		let isFirebaseConnected = false;
		let currentUser = null;
		let mapowanieKonkurencji = {};
		let mapowanieKategorii = {};
		let zawodnicyMap = new Map();
		let konkurencjeList = [];

		try {
			firebase.initializeApp(firebaseConfig);
			database = firebase.database();
			auth = firebase.auth();
			database.ref('.info/connected').on('value', (snap) => {
				isFirebaseConnected = snap.val() === true;
				if (currentUser) addLog(isFirebaseConnected ? '✅ Połączono z Firebase' : '⚠️ Brak połączenia', isFirebaseConnected ? 'success' : 'warning');
			});
			auth.onAuthStateChanged((user) => {
				if (user) {
					currentUser = user;
					document.getElementById('loginOverlay').style.display = 'none';
					document.getElementById('mainContent').style.display = 'block';
					document.getElementById('userInfo').innerHTML = `👤 ${user.email}`;
					addLog(`✅ Zalogowano jako: ${user.email}`, 'success');
					loadAllMappings();
					loadZawodnicy();
				} else {
					document.getElementById('mainContent').style.display = 'none';
					document.getElementById('loginOverlay').style.display = 'flex';
					currentUser = null;
				}
			});
		} catch (e) { console.error("Firebase init error:", e); }

		function login() {
			const email = document.getElementById('loginEmail').value.trim();
			const password = document.getElementById('loginPassword').value;
			if (!email || !password) {
				document.getElementById('loginError').style.display = 'block';
				document.getElementById('loginError').innerText = '❌ Wprowadź email i hasło';
				return;
			}
			document.getElementById('loginError').style.display = 'none';
			document.getElementById('loginBtn').disabled = true;
			auth.signInWithEmailAndPassword(email, password)
				.then(() => { document.getElementById('loginBtn').disabled = false; })
				.catch(() => {
					document.getElementById('loginBtn').disabled = false;
					document.getElementById('loginError').style.display = 'block';
					document.getElementById('loginError').innerText = '❌ Nieprawidłowy email lub hasło';
				});
		}
		
		function logout() { auth.signOut().then(() => addLog('✅ Wylogowano', 'success')); }
		
		function addLog(message, type = 'error') {
			const errorsList = document.getElementById('errorsList');
			const logDiv = document.createElement('div');
			logDiv.className = `error-item ${type === 'success' ? 'success-item' : (type === 'warning' ? 'warning-item' : '')}`;
			logDiv.innerHTML = `${new Date().toLocaleTimeString()} - ${message}`;
			errorsList.insertBefore(logDiv, errorsList.firstChild);
			while (errorsList.children.length > 50) errorsList.removeChild(errorsList.lastChild);
		}

		document.getElementById('clearErrors').addEventListener('click', () => {
			document.getElementById('errorsList').innerHTML = '';
			addLog('Logi wyczyszczone', 'success');
		});

		function showView(viewName) {
			const panel = document.getElementById('middlePanel');
			if (viewName === 'mappingKonkurencji') showMappingKonkurencjiView(panel);
			else if (viewName === 'mappingKategorii') showMappingKategoriiView(panel);
			else if (viewName === 'mappingZakazane') showMappingZakazaneView(panel);
			else if (viewName === 'import') showImportView(panel);
			else if (viewName === 'preview') showPreviewView(panel);
			else if (viewName === 'qrcode') showQRCodeView(panel);
			else if (viewName === 'email') showEmailView(panel);
			else if (viewName === 'camera') showCameraWipView(panel);
			else if (viewName === 'results') showResultsView(panel);
			else if (viewName === 'ranking') showRankingView(panel);
			else if (viewName === 'technical') showTechnicalView(panel);
			
			document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
			const activeBtn = document.querySelector(`.nav-btn[data-view="${viewName}"]`);
			if (activeBtn) activeBtn.classList.add('active');
		}

		// ==================== FUNKCJE POMOCNICZE ====================
		function saveJsonToDisk(jsonData, suggestedFileName) {
			try {
				if (!jsonData || Object.keys(jsonData).length === 0) return false;
				const blob = new Blob([JSON.stringify(jsonData, null, 2)], {type: 'application/json'});
				const url = URL.createObjectURL(blob);
				const a = document.createElement('a');
				a.href = url;
				a.download = suggestedFileName;
				document.body.appendChild(a);
				a.click();
				setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
				addLog(`💾 Plik zapisany jako "${suggestedFileName}"`, 'success');
				return true;
			} catch (err) { addLog(`❌ Błąd zapisu: ${err.message}`, 'error'); return false; }
		}

		function saveCsvToDisk(csvData, suggestedFileName) {
			try {
				if (!csvData || csvData.length === 0) return false;
				const blob = new Blob([csvData], {type: 'text/csv;charset=utf-8;'});
				const url = URL.createObjectURL(blob);
				const a = document.createElement('a');
				a.href = url;
				a.download = suggestedFileName;
				document.body.appendChild(a);
				a.click();
				setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
				addLog(`💾 Plik CSV zapisany jako "${suggestedFileName}"`, 'success');
				return true;
			} catch (err) { addLog(`❌ Błąd zapisu CSV: ${err.message}`, 'error'); return false; }
		}

		function generateCleanId(rowData, index) {
			if (rowData['ID'] && rowData['ID'].toString().trim() !== '') return rowData['ID'].toString().trim();
			return `${Date.now()}${index}`;
		}

		function getKategoriaZRocznika(rocznik) {
			if (!rocznik) return "OPEN";
			return mapowanieKategorii[rocznik.toString()] || "OPEN";
		}

		function getPelnaKategoria(plec, rocznik) {
			const kategoriaWiekowa = getKategoriaZRocznika(rocznik);
			if (!plec || !kategoriaWiekowa) return "";
			return `${plec} ${kategoriaWiekowa}`;
		}

		function czyscKonkurencje(nazwa) {
			if (!nazwa) return "";
			let nazwaCzysta = nazwa.trim().toUpperCase();
			if (mapowanieKonkurencji[nazwaCzysta]) return mapowanieKonkurencji[nazwaCzysta];
			for (let [key, value] of Object.entries(mapowanieKonkurencji)) {
				if (nazwaCzysta.includes(key) || key.includes(nazwaCzysta)) return value;
			}
			return nazwaCzysta;
		}

		function parseCSVRow(row) {
			const result = [];
			let inQuotes = false;
			let current = '';
			for (let i = 0; i < row.length; i++) {
				const char = row[i];
				if (char === '"') inQuotes = !inQuotes;
				else if (char === ',' && !inQuotes) { result.push(current); current = ''; }
				else current += char;
			}
			result.push(current);
			return result;
		}

		async function loadZawodnicy() {
			const snapshot = await database.ref('zawodnicy').once('value');
			const data = snapshot.val();
			if (data) {
				zawodnicyMap.clear();
				for (const [id, z] of Object.entries(data)) {
					zawodnicyMap.set(id, z);
					if (z.nr_startowy) zawodnicyMap.set(z.nr_startowy, z);
				}
			}
		}

	function obliczCzasBiegu(czasStartuStr, czasNaMecieStr) {
    if (!czasStartuStr || !czasNaMecieStr) return { formatted: '', seconds: null };
    
    try {
        // ============================================================
        // PARSOWANIE CZASU STARTU (YYYY-MM-DD HH:MM:SS.mmm)
        // ============================================================
        const startParts = czasStartuStr.split(' ');
        const datePart = startParts[0]; // "2026-06-19"
        const timePart = startParts[1]; // "09:10:19.672"
        
        const dateSplit = datePart.split('-');
        const year = parseInt(dateSplit[0]);
        const month = parseInt(dateSplit[1]) - 1;
        const day = parseInt(dateSplit[2]);
        
        const timeSplit = timePart.split(':');
        const hours = parseInt(timeSplit[0]);
        const minutes = parseInt(timeSplit[1]);
        const secSplit = timeSplit[2].split('.');
        const seconds = parseInt(secSplit[0]);
        const milliseconds = parseInt(secSplit[1] || '0');
        
        const startDate = new Date(year, month, day, hours, minutes, seconds, milliseconds);
        
        // ============================================================
        // PARSOWANIE CZASU NA MECIE (HH:MM:SS.mmm)
        // ============================================================
        const metaSplit = czasNaMecieStr.split(':');
        const metaHours = parseInt(metaSplit[0]);
        const metaMinutes = parseInt(metaSplit[1]);
        const metaSecSplit = metaSplit[2].split('.');
        const metaSeconds = parseInt(metaSecSplit[0]);
        const metaMilliseconds = parseInt(metaSecSplit[1] || '0');
        
        // Tworzymy datę na mecie - używamy tej samej daty co start
        const metaDate = new Date(year, month, day, metaHours, metaMinutes, metaSeconds, metaMilliseconds);
        
        // Jeśli czas na mecie jest przed czasem startu (np. start o 09:10, meta o 09:11)
        // to znaczy że meta jest tego samego dnia, ale później
        // Jeśli meta jest wcześniej niż start, dodajemy 1 dzień (np. start o 23:50, meta o 00:10)
        if (metaDate < startDate) {
            metaDate.setDate(metaDate.getDate() + 1);
        }
        
        // ============================================================
        // OBLICZANIE RÓŻNICY
        // ============================================================
        const diffMs = metaDate - startDate;
        if (diffMs < 0) return { formatted: '', seconds: null };
        
        const totalSeconds = diffMs / 1000;
        const mins = Math.floor(totalSeconds / 60);
        const secs = Math.floor(totalSeconds % 60);
        const ms = Math.floor((totalSeconds % 1) * 1000);
        
        const formatted = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}.${ms.toString().padStart(3, '0')}`;
        
        return { formatted, seconds: totalSeconds };
        
    } catch(e) {
        console.error("Błąd obliczania czasu:", e);
        return { formatted: '', seconds: null };
    }
}

		function showImportView(panel) {
			panel.innerHTML = `<div class="card"><h3>📂 Załaduj CSV → JSON/DB</h3><div class="file-upload" id="csvUploadArea">📁 Kliknij lub przeciągnij plik CSV</div><input type="file" id="csvFileInput" accept=".csv" style="display:none"><div style="margin-top:20px;"><label class="checkbox-label"><input type="checkbox" id="sendToFirebaseCheckbox" checked>📡 Wyślij do Firebase</label><label class="checkbox-label"><input type="checkbox" id="saveJsonLocallyCheckbox" checked>💾 Zapisz JSON lokalnie</label><label class="checkbox-label"><input type="checkbox" id="exportCsvCheckbox" checked>📧 Wygeneruj plik CSV do Mail Merge</label></div><div id="importProgress"></div></div>`;
			const uploadArea = document.getElementById('csvUploadArea');
			const fileInput = document.getElementById('csvFileInput');
			uploadArea.addEventListener('click', () => fileInput.click());
			fileInput.addEventListener('change', (e) => processCSV(e.target.files[0]));
			uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.style.borderColor = '#0f3460'; });
			uploadArea.addEventListener('dragleave', () => { uploadArea.style.borderColor = '#ccc'; });
			uploadArea.addEventListener('drop', (e) => { e.preventDefault(); uploadArea.style.borderColor = '#ccc'; const file = e.dataTransfer.files[0]; if (file && file.name.endsWith('.csv')) processCSV(file); else addLog('Proszę wybrać plik CSV', 'warning'); });
		}

		function processCSV(file) {
			if (!file) return;
			const sendToFirebase = document.getElementById('sendToFirebaseCheckbox')?.checked || false;
			const saveLocally = document.getElementById('saveJsonLocallyCheckbox')?.checked || false;
			const exportCsv = document.getElementById('exportCsvCheckbox')?.checked || false;
			addLog(`Przetwarzanie: ${file.name}`, 'success');
			const reader = new FileReader();
			reader.onload = function(e) {
				const text = e.target.result;
				const rows = text.split(/\r?\n/);
				if (rows.length < 2) { addLog('Plik CSV jest pusty', 'error'); return; }
				const headers = rows[0].split(',').map(h => h.replace(/["']/g, '').trim());
				const zawodnicy = {};
				let importCount = 0;
				for (let i = 1; i < rows.length; i++) {
					if (!rows[i].trim()) continue;
					const values = parseCSVRow(rows[i]);
					if (values.length < headers.length) continue;
					const rowData = {};
					headers.forEach((h, idx) => { rowData[h] = values[idx] ? values[idx].replace(/["']/g, '').trim() : ''; });
					if (rowData['REZYGNACJA'] === '1') continue;
					let rocznik = '';
					if (rowData['DATA URODZENIA']) { const yearMatch = rowData['DATA URODZENIA'].match(/\d{4}/); rocznik = yearMatch ? parseInt(yearMatch[0]) : ''; }
					let konkurencja1 = rowData['DYSTANS'] || '';
					if (konkurencja1.includes(' - ')) konkurencja1 = konkurencja1.split(' - ')[0];
					let mappedKonkurencja1 = czyscKonkurencje(konkurencja1);
					let konkurencja2 = rowData['Dodatkowa konkurencja'] || '';
					if (konkurencja2 === 'Brak' || konkurencja2 === '') konkurencja2 = null;
					let mappedKonkurencja2 = konkurencja2 ? czyscKonkurencje(konkurencja2) : null;
					const zawodnikId = generateCleanId(rowData, i);
					const plec = rowData['PŁEĆ'] || '';
					const pelnaKategoria = getPelnaKategoria(plec, rocznik);
					zawodnicy[zawodnikId] = {
						id: zawodnikId, imie: (rowData['IMIĘ'] || '').toUpperCase(), nazwisko: (rowData['NAZWISKO'] || '').toUpperCase(),
						rocznik: rocznik, kategoria_wiekowa: getKategoriaZRocznika(rocznik), pelna_kategoria: pelnaKategoria,
						konkurencja1: mappedKonkurencja1, konkurencja2: mappedKonkurencja2, nr_startowy: '', pakiet_odebrany: 'NIE',
						plec: plec, rezygnacja: 'FALSE', email: rowData['EMAIL'] || ''
					};
					importCount++;
				}
				const timestamp = new Date().toISOString().slice(0,19).replace(/:/g, '-');
				if (saveLocally) saveJsonToDisk(zawodnicy, `zawodnicy_${timestamp}.json`);
				if (exportCsv && Object.keys(zawodnicy).length > 0) {
					const rowsCsv = [["ID", "IMIĘ", "EMAIL", "Path"]];
					for (const [id, z] of Object.entries(zawodnicy)) rowsCsv.push([id, z.imie, z.email, `${id}.png`]);
					const csvContent = rowsCsv.map(row => row.map(cell => typeof cell === 'string' && (cell.includes(',') || cell.includes('"')) ? `"${cell.replace(/"/g, '""')}"` : cell).join(',')).join('\n');
					setTimeout(() => saveCsvToDisk(csvContent, `do_wysylki_${timestamp}.csv`), 500);
				}
				if (sendToFirebase && isFirebaseConnected) {
					database.ref('zawodnicy').set(zawodnicy).then(() => addLog(`✅ Zapisano ${importCount} zawodników do Firebase`, 'success'));
				}
			};
			reader.readAsText(file, 'UTF-8');
		}

// Przechowuj dane w pamięci, aby nie odświeżać przy zmianie limitu
let cachedStatsData = null;
let cachedLimityData = null;
let cachedZawodnicy = null;

async function loadPreviewData() {
    const container = document.getElementById('previewTableContainer');
    const statsContainer = document.getElementById('statsContainer');
    if (!container) return;
    if (!isFirebaseConnected) {
        container.innerHTML = '<div class="error-item">⚠️ Brak połączenia z Firebase</div>';
        if (statsContainer) statsContainer.innerHTML = '<div class="error-item">⚠️ Brak połączenia</div>';
        return;
    }
    
    // Pokaż loading tylko przy pierwszym ładowaniu lub ręcznym odświeżeniu
    if (!cachedStatsData) {
        container.innerHTML = '<div class="loading">⏳ Ładowanie danych...</div>';
        if (statsContainer) statsContainer.innerHTML = '<div class="loading">⏳ Ładowanie statystyk...</div>';
    }
    
    try {
        // Pobierz dane tylko jeśli nie są w cache
        if (!cachedStatsData) {
            // Pobierz również zakazane konkurencje
            const [snapshotZawodnicy, snapshotLimity, snapshotZakazane] = await Promise.all([
                database.ref('zawodnicy').once('value'),
                database.ref('limity_konkurencji').once('value'),
                database.ref('zakazane_konkurencje').once('value')
            ]);

            const data = snapshotZawodnicy.val();
            cachedLimityData = snapshotLimity.val() || {};
            cachedZakazaneData = snapshotZakazane.val() || {};
            
            if (!data || Object.keys(data).length === 0) {
                container.innerHTML = '<div class="card">📭 Brak danych. Zaimportuj CSV.</div>';
                if (statsContainer) statsContainer.innerHTML = '<div class="card">📭 Brak danych do statystyk</div>';
                return;
            }
            
            cachedZawodnicy = Object.values(data);
            
            // ==================== STATYSTYKI ====================
            const stats = {};
            for (const z of cachedZawodnicy) {
                if (z.rezygnacja === 'TRUE') continue;
                const kategoria = z.pelna_kategoria || z.kategoria_wiekowa || 'BRAK';
                
                const konk1 = z.konkurencja1;
                if (konk1 && konk1 !== '') {
                    const key = `${konk1}|${kategoria}`;
                    if (!stats[key]) stats[key] = 0;
                    stats[key]++;
                }
                
                const konk2 = z.konkurencja2;
                if (konk2 && konk2 !== '') {
                    const key = `${konk2}|${kategoria}`;
                    if (!stats[key]) stats[key] = 0;
                    stats[key]++;
                }
            }
            cachedStatsData = stats;
        }
        
        // Renderuj tabelę (używając cached danych)
        renderStatsTable(statsContainer, cachedStatsData, cachedLimityData, cachedZakazaneData);
        
        // ==================== TABELA ZAWODNIKÓW ====================
        renderZawodnicyTable(container);
        
        addLog(`✅ Wyświetlono ${cachedZawodnicy.length} zawodników`, 'success');
        
    } catch (err) {
        console.error('❌ Błąd w loadPreviewData:', err);
        container.innerHTML = `<div class="error-item">❌ Błąd: ${err.message}</div>`;
        if (statsContainer) statsContainer.innerHTML = `<div class="error-item">❌ Błąd: ${err.message}</div>`;
        addLog(`❌ Błąd odczytu Firebase: ${err.message}`, 'error');
    }
}

// Funkcja do ręcznego odświeżenia (czyści cache)
function refreshPreviewData() {
    cachedStatsData = null;
    cachedLimityData = null;
    cachedZawodnicy = null;
    cachedZakazaneData = null;
    loadPreviewData();
    addLog('🔄 Odświeżono dane', 'success');
}

        // Szukamy dokładnego dopasowania kategorii
        for (const [kat, zakazaneList] of Object.entries(zakazaneData)) {
            if (kat === kategoria && Array.isArray(zakazaneList)) {
                return zakazaneList.includes(konkurencja);
            }
        }
        
        // Szukamy częściowego dopasowania
        for (const [kat, zakazaneList] of Object.entries(zakazaneData)) {
            if (kategoria.includes(kat) || kat.includes(kategoria)) {
                if (Array.isArray(zakazaneList) && zakazaneList.includes(konkurencja)) {

                }
            }
        }

    let statsHtml = `

                    await database.ref(`limity_konkurencji/${limitKey}`).remove();

                    addLog(`❌ Błąd: ${err.message}`, 'error');

                    updateStatusCell(statusCell, liczba, limitNum);

            }

    });

async function saveResults(protocolId) {
    if (!currentUser) {
        addLog('❌ Musisz być zalogowany!', 'error');
        return;
    }
    
    if (!currentProtocol || !currentProtocol.tory) {
        addLog('❌ Brak danych do zapisu!', 'error');
        return;
    }
    
    try {
        const tory = currentProtocol.tory || [];
        const newResults = [];
        
        for (let i = 0; i < tory.length; i++) {
            const tor = tory[i];
            const torNumer = tor.numer;
            
            // Pobierz wartości z pól
            const czasNaMecie = document.querySelector(`.czas-meta-input[data-tor="${torNumer}"]`)?.value || '';
            const recznyCzasInput = document.querySelector(`.reczny-czas-input[data-tor="${torNumer}"]`);
            const recznyCzas = recznyCzasInput ? recznyCzasInput.value : '';
            const status = document.querySelector(`.status-select[data-tor="${torNumer}"]`)?.value || null;
            const miejsce = document.querySelector(`.miejsce-input[data-tor="${torNumer}"]`)?.value || null;
            
            // Oblicz czas biegu w sekundach
            let czasBieguFormat = recznyCzas;
            let czasBieguSekundy = null;
            
            if (recznyCzas && recznyCzas.trim() !== '') {
                // Parsuj MM:SS.mmm
                const parts = recznyCzas.split(':');
                if (parts.length === 2) {
                    const mins = parseInt(parts[0]);
                    const secs = parseFloat(parts[1]);
                    if (!isNaN(mins) && !isNaN(secs)) {
                        czasBieguSekundy = mins * 60 + secs;
                        czasBieguFormat = recznyCzas;
                    }
                }
            } else if (czasNaMecie && currentProtocol.czas_startu) {
                const obliczony = obliczCzasBiegu(currentProtocol.czas_startu, czasNaMecie);
                czasBieguFormat = obliczony.formatted;
                czasBieguSekundy = obliczony.seconds;
            }
            
            newResults.push({
                czas_na_mecie: czasNaMecie || null,
                reczny_czas_biegu: recznyCzas || null,
                status: status,
                miejsce: miejsce || null,
                czas_biegu_format: czasBieguFormat,
                czas_biegu_sekundy: czasBieguSekundy
            });
        }
        
        // Zapisz do Firebase
        await database.ref(`protokoly/${protocolId}/wyniki`).set(newResults);
        
        // Zaktualizuj lokalny protokół
        currentProtocol.wyniki = newResults;
        
        addLog(`✅ Wyniki zapisane w protokole ${protocolId}`, 'success');
        showMessage('✅ Wyniki zapisane pomyślnie!', 'success');
        
        // Odśwież listę protokołów
        await loadProtocolsList();
        
    } catch (err) {
        console.error('Błąd zapisu:', err);
        addLog(`❌ Błąd zapisu: ${err.message}`, 'error');
        showMessage(`❌ Błąd zapisu: ${err.message}`, 'error');
    }
}

    showMessage('Wyczyszczono wybór', 'success');
}

async function loadProtocolsList() {
    const container = document.getElementById('protocolsList');
    if (!container) return;
    if (!isFirebaseConnected) {
        container.innerHTML = '<div class="error-item">⚠️ Brak połączenia z Firebase</div>';
        return;
    }
    
    container.innerHTML = '<div class="loading">⏳ Ładowanie protokołów...</div>';
    
    try {
        const snapshot = await database.ref('protokoly').orderByChild('data_utworzenia').once('value');
        const data = snapshot.val();
        
        if (!data || Object.keys(data).length === 0) {
            container.innerHTML = '<div class="card">📭 Brak protokołów. Użyj aplikacji "Sędzia Startowy" do utworzenia protokołów.</div>';
            return;
        }
        
        const protocols = Object.entries(data).map(([id, p]) => ({ id, ...p }));
        protocols.sort((a, b) => new Date(b.data_utworzenia) - new Date(a.data_utworzenia));
        
        let html = '<div style="font-size: 0.85rem;">';
        protocols.forEach(p => {
            const hasStart = p.czas_startu ? '✅' : '⏳';
            const statusClass = p.czas_startu ? 'protocol-item' : 'protocol-item';
            const falstart = p.falstart ? ' ⚠️ FALSTART' : '';
            
            // Liczba zawodników
            const zawodnicyCount = p.tory ? p.tory.filter(t => t.nr_startowy).length : 0;
            const wynikiCount = p.wyniki ? p.wyniki.filter(w => w.czas_na_mecie || w.reczny_czas_biegu).length : 0;
            
            html += `
                <div class="${statusClass}" data-id="${p.id}" style="padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; border-left: 4px solid ${p.czas_startu ? '#28a745' : '#ffc107'};">
                    <div style="display: flex; justify-content: space-between; flex-wrap: wrap; gap: 5px;">
                        <div>
                            <strong>${p.konkurencja || '?'}</strong> - 
                            <span style="color: #0f3460;">${p.kategoria || '?'}</span>
                            <span style="background: #0f3460; color: white; padding: 2px 10px; border-radius: 12px; font-size: 0.75rem;">Bieg ${p.numer_biegu || '?'}</span>
                            ${falstart}
                        </div>
                        <div style="font-size: 0.8rem; color: #666;">
                            ${hasStart} ${p.czas_startu || 'brak startu'} 
                            | 👥 ${zawodnicyCount}/${p.ilosc_torow || 0} 
                            | 📊 ${wynikiCount}
                        </div>
                    </div>
                    <div style="font-size: 0.75rem; color: #999; margin-top: 5px;">
                        ${new Date(p.data_utworzenia).toLocaleString()}
                        ${p.utworzono_przez ? ` | ${p.utworzono_przez}` : ''}
                    </div>
                </div>
            `;
        });
        html += '</div>';
        container.innerHTML = html;
        
        // Click na protokół
        document.querySelectorAll('.protocol-item').forEach(el => {
            el.addEventListener('click', () => {
                const id = el.getAttribute('data-id');
                document.querySelectorAll('.protocol-item').forEach(p => p.classList.remove('selected'));
                el.classList.add('selected');
                el.style.borderLeftColor = '#0f3460';
                loadProtocolForEdit(id);
            });
        });
        
        addLog(`✅ Załadowano ${protocols.length} protokołów`, 'success');
        
    } catch (err) {
        container.innerHTML = `<div class="error-item">❌ Błąd: ${err.message}</div>`;
        addLog(`❌ Błąd ładowania protokołów: ${err.message}`, 'error');
    }
}

async function loadProtocolForEdit(protocolId) {
    const snapshot = await database.ref(`protokoly/${protocolId}`).once('value');
    const protocol = snapshot.val();
    if (!protocol) {
        addLog('❌ Nie znaleziono protokołu', 'error');
        return;
    }
    
    currentProtocol = protocol;
    currentProtocolId = protocolId;
    currentProtocolData = { ...protocol };
    
    // ============================================================
    // POBRANIE WYNIKÓW Z /wyniki_biegowe/
    // ============================================================
    const wynikKey = `${protocol.kategoria.replace(/ /g, '_')}_${protocol.konkurencja.replace(/ /g, '_')}`;
    
    let wynikiZFirebase = {};
    try {
        const wynikiSnapshot = await database.ref('wyniki_biegowe').once('value');
        const wszystkieWyniki = wynikiSnapshot.val() || {};
        
        // Szukamy wyników dla tej konkurencji
        const possibleKeys = [
            wynikKey,
            `${protocol.konkurencja.replace(/ /g, '_')}_${protocol.kategoria.replace(/ /g, '_')}`,
            `${protocol.kategoria.replace(/ /g, '_')}_${protocol.konkurencja.replace(/ /g, '_')}`
        ];
        
        for (const key of possibleKeys) {
            if (wszystkieWyniki[key]) {
                wynikiZFirebase = wszystkieWyniki[key];
                addLog(`✅ Znaleziono wyniki dla: ${key}`, 'success');
                break;
            }
        }
        
        if (Object.keys(wynikiZFirebase).length === 0) {
            for (const [key, value] of Object.entries(wszystkieWyniki)) {
                if (key.includes(protocol.konkurencja.replace(/ /g, '_')) || 
                    key.includes(protocol.kategoria.replace(/ /g, '_'))) {
                    wynikiZFirebase = value;
                    addLog(`✅ Znaleziono wyniki w: ${key}`, 'success');
                    break;
                }
            }
        }
    } catch (err) {
        addLog(`⚠️ Błąd pobierania wyników: ${err.message}`, 'warning');
    }
    
    // ============================================================
    // MAPOWANIE WYNIKÓW PO NUMERZE STARTOWYM
    // ============================================================
    const wynikiMap = {};
    if (wynikiZFirebase && Object.keys(wynikiZFirebase).length > 0) {
        for (const [id, wynik] of Object.entries(wynikiZFirebase)) {
            const nrStartowy = wynik.zawodnik ? String(wynik.zawodnik) : '';
            if (nrStartowy) {
                wynikiMap[nrStartowy] = wynik;
            }

        addLog(`✅ Załadowano ${Object.keys(wynikiMap).length} wyników z Firebase`, 'success');

    // Pobierz listę zawodników

                                  ${wynikZFirebase ? 'background: #d4edda;' : ''}">
                </td>
                <td>
                    <input type="text" class="reczny-czas-input" data-tor="${tor.numer}" 
                           value="${czasBieguDoWyswietlenia}" 
                           placeholder="MM:SS.mmm" 
                           style="width:100px; padding:4px; border-radius:4px; border:1px solid #ddd; font-family:monospace;
                                  ${wynikZFirebase ? 'background: #d4edda;' : ''}">

                <td>
                    <input type="text" class="miejsce-input" data-tor="${tor.numer}"

                           style="width:50px; padding:4px; border-radius:4px; border:1px solid #ddd; text-align:center;">
                </td>

    }
    
    html += `
            </tbody>
        </table>
        <div style="margin-top: 15px; font-size: 0.85rem; color: #666;">
            <span style="background: #d4edda; padding: 4px 12px; border-radius: 12px;">✅ Zgodny z kategorią/konkurencją</span>
            <span style="background: #fff3cd; padding: 4px 12px; border-radius: 12px; margin-left: 10px;">⚠️ Ostrzeżenie - sprawdź dane</span>
            <span style="background: #d4edda; padding: 4px 12px; border-radius: 12px; margin-left: 10px;">🔥 Wynik z Firebase</span>
        </div>
    `;
    
    document.getElementById('resultsEditor').innerHTML = html;
    document.getElementById('editPanel').style.display = 'block';
    
    // ============================================================

    // ============================================================
    const loadBtn = document.getElementById('loadResultsBtn');
    if (loadBtn) {
        loadBtn.addEventListener('click', () => {
            loadProtocolForEdit(protocolId);
            addLog('🔄 Przeładowano wyniki z Firebase', 'success');
        });
    }
    
    // ============================================================
    // AUTOMATYCZNE PRZELICZANIE CZASU PRZY ZMIANIE CZASU NA MECIE
    // ============================================================
    document.querySelectorAll('.czas-meta-input').forEach(input => {
        input.addEventListener('change', function() {
            const tor = this.getAttribute('data-tor');
            const recznyInput = document.querySelector(`.reczny-czas-input[data-tor="${tor}"]`);
            if (recznyInput && currentProtocol.czas_startu) {
                const czasBiegu = obliczCzasBiegu(currentProtocol.czas_startu, this.value);
                if (czasBiegu.formatted) {
                    recznyInput.value = czasBiegu.formatted;
                    addLog(`🔄 Przeliczono czas dla toru ${tor}: ${czasBiegu.formatted}`, 'success');
                }
            }
        });
    });
    
    // ============================================================
    // EVENT LISTENER DLA NUMERÓW STARTOWYCH
    // ============================================================
    document.querySelectorAll('.nr-startowy-input').forEach(input => {
        input.addEventListener('change', async (e) => {
            const tor = e.target.getAttribute('data-tor');
            const nrStartowy = e.target.value.trim();
            const row = e.target.closest('tr');
            const zawodnikInfo = row.querySelector('.zawodnik-info');
            const rocznikCell = row.querySelector('.rocznik-cell');
            const kategoriaCell = row.querySelector('.kategoria-cell');
            
            if (!nrStartowy) {
                zawodnikInfo.innerText = '';
                rocznikCell.innerText = '-';
                kategoriaCell.innerText = '-';
                return;
            }
            
            let znaleziony = null;
            for (const [id, z] of Object.entries(zawodnicyData)) {
                if (z.nr_startowy == nrStartowy || z.id === nrStartowy) {
                    znaleziony = z;
                    break;
                }
            }
            
            if (znaleziony) {
                const zgodnosc = sprawdzZgodnoscZawodnika(znaleziony, protocol.kategoria, protocol.konkurencja);
                const statusText = zgodnosc.zgodny ? '✅' : '⚠️ ' + zgodnosc.szczegoly;
                zawodnikInfo.innerHTML = `${znaleziony.imie || ''} ${znaleziony.nazwisko || ''} <span style="font-size:0.7rem; color:${zgodnosc.zgodny ? '#28a745' : '#dc3545'};">${statusText}</span>`;
                rocznikCell.innerText = znaleziony.rocznik || '-';
                kategoriaCell.innerText = znaleziony.pelna_kategoria || znaleziony.kategoria_wiekowa || '-';
                
                if (!currentProtocol.tory[tor-1].zawodnik) currentProtocol.tory[tor-1].zawodnik = {};
                currentProtocol.tory[tor-1].zawodnik.id = znaleziony.id;
                currentProtocol.tory[tor-1].zawodnik.imie = znaleziony.imie;
                currentProtocol.tory[tor-1].zawodnik.nazwisko = znaleziony.nazwisko;
                currentProtocol.tory[tor-1].zawodnik.rocznik = znaleziony.rocznik;
                currentProtocol.tory[tor-1].zawodnik.kategoria = znaleziony.pelna_kategoria || znaleziony.kategoria_wiekowa;
                currentProtocol.tory[tor-1].nr_startowy = nrStartowy;
                
                addLog(`✅ Wczytano: ${znaleziony.imie} ${znaleziony.nazwisko}`, 'success');
            } else {
                zawodnikInfo.innerText = '❌ Nie znaleziono';
                rocznikCell.innerText = '-';
                kategoriaCell.innerText = '-';
                addLog(`⚠️ Nie znaleziono zawodnika z numerem ${nrStartowy}`, 'warning');
            }
        });
    });
    
        // ============================================================
    // GLOBALNE PRZELICZANIE CZASÓW + MIEJSC
    // ============================================================
    const globalBtn = document.getElementById('globalRecalcBtn');
    if (globalBtn) {
        const newBtn = globalBtn.cloneNode(true);
        globalBtn.parentNode.replaceChild(newBtn, globalBtn);
        newBtn.addEventListener('click', () => {
            const czasMetaInputs = document.querySelectorAll('.czas-meta-input');
            let count = 0;
            
            // ============================================================
            // KROK 1: Przelicz wszystkie czasy
            // ============================================================
            czasMetaInputs.forEach(input => {
                const tor = input.getAttribute('data-tor');
                const recznyInput = document.querySelector(`.reczny-czas-input[data-tor="${tor}"]`);
                if (recznyInput && currentProtocol.czas_startu) {
                    const czasBiegu = obliczCzasBiegu(currentProtocol.czas_startu, input.value);
                    if (czasBiegu.formatted) {
                        recznyInput.value = czasBiegu.formatted;
                        count++;
                    }
                }
            });
            
            // ============================================================
            // KROK 2: Pobierz wszystkie czasy i posortuj
            // ============================================================
            const results = [];
            document.querySelectorAll('.reczny-czas-input').forEach(input => {
                const tor = parseInt(input.getAttribute('data-tor'));
                const czas = input.value.trim();
                const statusSelect = document.querySelector(`.status-select[data-tor="${tor}"]`);
                const status = statusSelect ? statusSelect.value : '';
                
                // Pomijamy zawodników ze statusem (PK, DNF, DNS, DQ)
                if (status && status !== '') {
                    results.push({
                        tor: tor,
                        czas: czas,
                        status: status,
                        czasSekundy: null,
                        miejsce: null
                    });
                    return;
                }
                
                // Parsuj czas MM:SS.mmm na sekundy
                let czasSekundy = null;
                if (czas) {
                    const parts = czas.split(':');
                    if (parts.length === 2) {
                        const mins = parseInt(parts[0]);
                        const secs = parseFloat(parts[1]);
                        if (!isNaN(mins) && !isNaN(secs)) {
                            czasSekundy = mins * 60 + secs;
                        }
                    }
                }
                
                results.push({
                    tor: tor,
                    czas: czas,
                    status: status,
                    czasSekundy: czasSekundy,
                    miejsce: null
                });
            });
            
            // ============================================================
            // KROK 3: Posortuj tylko zawodników bez statusu
            // ============================================================
            const normalni = results.filter(r => !r.status || r.status === '');
            
            // Sortuj od najlepszego czasu (najmniejsza wartość)
            normalni.sort((a, b) => {
                // Jeśli obaj mają NULL, są równe
                if (a.czasSekundy === null && b.czasSekundy === null) return 0;
                if (a.czasSekundy === null) return 1;  // NULL na koniec
                if (b.czasSekundy === null) return -1; // NULL na koniec
                return a.czasSekundy - b.czasSekundy;
            });
            
            // ============================================================
            // KROK 4: Przypisz miejsca (z uwzględnieniem ex aequo)
            // ============================================================
            let position = 1;
            let i = 0;
            
            while (i < normalni.length) {
                let j = i;
                // Znajdź grupę z identycznymi czasami
                while (j < normalni.length - 1 && 
                       normalni[j].czasSekundy === normalni[j+1].czasSekundy &&
                       normalni[j].czasSekundy !== null) {
                    j++;
                }
                
                const countInGroup = j - i + 1;
                const isExAequo = countInGroup > 1;
                
                // Przypisz tę samą pozycję dla całej grupy
                for (let k = i; k <= j; k++) {
                    normalni[k].miejsce = position;
                    normalni[k].ex_aequo = isExAequo;
                }
                
                position += countInGroup;
                i = j + 1;
            }
            
            // ============================================================
            // KROK 5: Zaktualizuj pola miejsc w tabeli
            // ============================================================
            const miejsceMap = {};
            results.forEach(r => {
                if (r.miejsce !== null) {
                    const exAequoSuffix = r.ex_aequo ? '=' : '';
                    miejsceMap[r.tor] = r.miejsce + exAequoSuffix;
                } else if (r.status) {
                    // Dla zawodników ze statusem - zostaw puste
                    miejsceMap[r.tor] = '';
                }
            });
            
            // Wstaw miejsca do pól
            document.querySelectorAll('.miejsce-input').forEach(input => {
                const tor = parseInt(input.getAttribute('data-tor'));
                if (miejsceMap[tor] !== undefined) {
                    input.value = miejsceMap[tor];
                }
            });
            
            // ============================================================
            // KROK 6: Log i informacja zwrotna
            // ============================================================
            const zMiejscem = Object.values(miejsceMap).filter(v => v !== '').length;
            const zeStatusem = results.filter(r => r.status && r.status !== '').length;
            const bezCzasu = results.filter(r => !r.status && !r.czas).length;
            
            let infoMsg = `✅ Przeliczono ${count} czasów`;
            if (zMiejscem > 0) infoMsg += `, przypisano ${zMiejscem} miejsc`;
            if (zeStatusem > 0) infoMsg += `, ${zeStatusem} ze statusem (pominiętych)`;
            if (bezCzasu > 0) infoMsg += `, ${bezCzasu} bez czasu`;
            
            addLog(infoMsg, 'success');
            showMessage(infoMsg, 'success');
        });
    }
    
    // Event listeners dla przycisków
    document.getElementById('saveResultsBtn').onclick = () => saveResults(protocolId);
    document.getElementById('deleteProtocolBtn').onclick = () => deleteProtocol(protocolId);
}

// Funkcja sprawdzania zgodności zawodnika
function sprawdzZgodnoscZawodnika(zawodnik, wymaganaKategoria, wymaganaKonkurencja) {
    if (!zawodnik || !zawodnik.imie) {
        return { zgodny: false, szczegoly: 'Brak danych zawodnika' };
    }
    
    const problemy = [];
    
    // Sprawdzenie kategorii
    const pelnaKategoria = zawodnik.kategoria || zawodnik.pelna_kategoria || zawodnik.kategoria_wiekowa;
    if (pelnaKategoria && wymaganaKategoria && pelnaKategoria !== wymaganaKategoria) {
        problemy.push(`Kategoria: ${pelnaKategoria} (oczekiwano: ${wymaganaKategoria})`);
    }
    
    // Sprawdzenie konkurencji
    const konkurencjeZawodnika = [];
    if (zawodnik.konkurencja1) konkurencjeZawodnika.push(zawodnik.konkurencja1);
    if (zawodnik.konkurencja2) konkurencjeZawodnika.push(zawodnik.konkurencja2);
    
    if (!konkurencjeZawodnika.includes(wymaganaKonkurencja)) {
        problemy.push(`Nie startuje w ${wymaganaKonkurencja} (ma: ${konkurencjeZawodnika.join(', ') || 'brak'})`);
    }
    
    // Sprawdzenie rezygnacji
    if (zawodnik.rezygnacja === 'TRUE' || zawodnik.rezygnacja === true) {
        problemy.push('⚠️ Zawodnik zrezygnował');
    }
    
    return {
        zgodny: problemy.length === 0,
        szczegoly: problemy.join(' | ')
    };
}

		async function setZakonczoneBiegi(konkurencja, kategoria) {
		const snapshot = await database.ref('protokoly').once('value');
		const data = snapshot.val();
		if (!data) return;
		const updates = {};
		let count = 0;
		for (const [id, protocol] of Object.entries(data)) {
			if (protocol.konkurencja === konkurencja && protocol.kategoria === kategoria) {
				updates[`${id}/zakonczone`] = true;
				updates[`${id}/data_zakonczenia`] = Date.now();
				count++;
			}
		}
		if (count === 0) {
			addLog('⚠️ Nie znaleziono protokołów dla tej konkurencji', 'warning');
			return;
		}
		await database.ref('protokoly').update(updates);
		addLog(`🔒 Zakończono konkurencję ${konkurencja} - ${kategoria} (${count} protokołów)`, 'success');
		await loadRanking(); // odśwież widok
	}

	   async function loadRanking() {
    const container = document.getElementById('rankingContainer');
    if (!container) return;
    container.innerHTML = '<div class="loading">⏳ Ładowanie wyników...</div>';
    
    const snapshot = await database.ref('protokoly').once('value');
    const data = snapshot.val();
    if (!data || Object.keys(data).length === 0) { 
        container.innerHTML = '<div class="card">📭 Brak protokołów z wynikami.</div>'; 
        return; 
    }
    
    const allResults = [];
    for (const [protocolId, protocol] of Object.entries(data)) {
        if (!protocol.wyniki || !protocol.tory) continue;
        const tory = protocol.tory, wyniki = protocol.wyniki;
        for (let i = 0; i < tory.length && i < wyniki.length; i++) {
            const tor = tory[i], wynik = wyniki[i], zawodnik = tor.zawodnik || {};
            allResults.push({
                id: zawodnik.id,
                nr_startowy: tor.nr_startowy || '',
                imie: zawodnik.imie || '',
                nazwisko: zawodnik.nazwisko || '',
                rocznik: zawodnik.rocznik || '',
                kategoria: protocol.kategoria || '',
                konkurencja: protocol.konkurencja || '',
                numer_biegu: protocol.numer_biegu || '',
                tor: tor.numer,
                status: wynik.status || null,
                miejsce_w_biegu: wynik.miejsce || null,
                czas_biegu_format: wynik.czas_biegu_format || '',
                czas_biegu_sekundy: wynik.czas_biegu_sekundy || null,
                zakonczone: protocol.zakonczone === true
            });
        }
    }
    
    if (allResults.length === 0) { 
        container.innerHTML = '<div class="card">📭 Brak wyników.</div>'; 
        return; 
    }
    
    // Zlicz duplikaty numerów startowych TYLKO dla normalnych (bez statusu)
    const nrStartowyCount = {};
    for (const r of allResults) {
        if (!r.status || r.status === '') {
            if (r.nr_startowy) {
                nrStartowyCount[r.nr_startowy] = (nrStartowyCount[r.nr_startowy] || 0) + 1;
            }
        }
    }
    
    // Grupowanie po konkurencji i kategorii
    const groups = {};
    for (const r of allResults) { 
        const key = `${r.konkurencja}_${r.kategoria}`; 
        if (!groups[key]) groups[key] = []; 
        groups[key].push(r); 
    }
    
    let html = '';
    
    for (const [key, results] of Object.entries(groups)) {
        const [konkurencja, kategoria] = key.split('_');
        
        // Sprawdź, czy którykolwiek protokół w grupie jest zakończony
        const isZakonczone = results.some(r => r.zakonczone === true);
        
        // Podział na grupy: normalni, PK, inni
        const normalni = results.filter(r => !r.status || r.status === '');
        const pk = results.filter(r => r.status === 'PK');
        const inni = results.filter(r => r.status && r.status !== 'PK');
        
        // ============================================================
        // SORTOWANIE Z UWZGLĘDNIENIEM EX AEQUO
        // ============================================================
        
        // Sortowanie normalnych (od najlepszego czasu)
        normalni.sort((a, b) => {
            const czasA = a.czas_biegu_sekundy !== null ? a.czas_biegu_sekundy : Infinity;
            const czasB = b.czas_biegu_sekundy !== null ? b.czas_biegu_sekundy : Infinity;
            return czasA - czasB;
        });
        
        // ============================================================
        // PRZYZNAWANIE MIEJSC Z EX AEQUO DLA NORMALNYCH
        // ============================================================
        let position = 1;
        let i = 0;
        
        while (i < normalni.length) {
            let j = i;
            // Znajdź grupę zawodników z identycznymi czasami (ex aequo)
            while (j < normalni.length - 1 && 
                   normalni[j].czas_biegu_sekundy === normalni[j+1].czas_biegu_sekundy &&
                   normalni[j].czas_biegu_sekundy !== null) {
                j++;
            }
            
            const countInGroup = j - i + 1;
            const isExAequo = countInGroup > 1;
            
            // Przypisz tę samą pozycję dla całej grupy
            for (let k = i; k <= j; k++) {
                normalni[k].pozycja = position;
                normalni[k].ex_aequo = isExAequo;
            }
            
            position += countInGroup;
            i = j + 1;
        }
        
        // PK sortowane osobno (bez ex aequo)
        pk.sort((a, b) => {
            const czasA = a.czas_biegu_sekundy !== null ? a.czas_biegu_sekundy : Infinity;
            const czasB = b.czas_biegu_sekundy !== null ? b.czas_biegu_sekundy : Infinity;
            return czasA - czasB;
        });
        for (let idx = 0; idx < pk.length; idx++) {
            pk[idx].pozycja = null; // PK nie mają pozycji
        }
        
        // Inni (DNF, DQ, DNS) - sortowanie po statusie
        const statusOrder = { 'DNF': 0, 'DQ': 1, 'DNS': 2 };
        inni.sort((a, b) => {
            const orderA = statusOrder[a.status] || 3;
            const orderB = statusOrder[b.status] || 3;
            if (orderA !== orderB) return orderA - orderB;
            const czasA = a.czas_biegu_sekundy !== null ? a.czas_biegu_sekundy : Infinity;
            const czasB = b.czas_biegu_sekundy !== null ? b.czas_biegu_sekundy : Infinity;
            return czasA - czasB;
        });
        for (const r of inni) {
            r.pozycja = null; // Inni nie mają pozycji
        }
        
        // ============================================================
        // GENEROWANIE KARTY Z WYNIKAMI
        // ============================================================
        
        html += `<div class="card" style="margin-top: 20px;">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
                <h3>${konkurencja || '?'} - ${kategoria || '?'} ${isZakonczone ? '🔒' : ''}</h3>`;
        if (!isZakonczone) {
            html += `<button class="close-competition-btn" data-konkurencja="${konkurencja}" data-kategoria="${kategoria}" style="background:#dc3545; margin-left:15px; margin-top:0;">🔒 Zakończ konkurencję</button>`;
        } else {
            html += `<button class="close-competition-btn" disabled style="background:#6c757d; margin-left:15px; margin-top:0;">✅ Zamknięta</button>`;
        }
        html += `</div>`;
        
        if (isZakonczone) {
            html += `<div class="info-note" style="background:#d4edda;">🔒 Konkurencja została zakończona. Wyniki są ostateczne.</div>`;
        }
        
        html += `<table class="ranking-table"><thead>
            <th>Poz.</th><th>Nr</th><th>Zawodnik</th><th>Rocznik</th><th>Czas</th><th>Bieg</th><th>Miejsce w biegu</th><th>Status</th>
        </thead><tbody>`;
        
        // ============================================================
        // NORMALNI (z pozycjami)
        // ============================================================
        for (const r of normalni) {
            const isDuplicate = nrStartowyCount[r.nr_startowy] > 2;
            const nrStyle = isDuplicate ? 'style="background:#fff3cd; font-weight:bold;"' : '';
            let rowClass = '';
            if (r.pozycja === 1) rowClass = 'position-1';
            else if (r.pozycja === 2) rowClass = 'position-2';
            else if (r.pozycja === 3) rowClass = 'position-3';
            
            // Wyświetlanie pozycji z ex aequo
            let pozycjaDisplay = r.pozycja;
            if (r.ex_aequo) {
                pozycjaDisplay = r.pozycja + '=';
            }
            
            html += `<tr class="${rowClass}">
                <td class="position-cell"><strong>${pozycjaDisplay}</strong></td>
                <td ${nrStyle}>${r.nr_startowy || '-'}${isDuplicate ? ' ⚠️' : ''}</td>
                <td><strong>${r.imie} ${r.nazwisko}</strong></td>
                <td>${r.rocznik || '-'}</td>
                <td><strong>${r.czas_biegu_format || '-'}</strong></td>
                <td>${r.numer_biegu || '-'}</td>
                <td>${r.miejsce_w_biegu || '-'}</td>
                <td><span class="status-badge">-</span></td>
            </tr>`;
        }
        
        // ============================================================
        // PK
        // ============================================================
        for (const r of pk) {
            html += `<tr>
                <td class="position-cell">PK</td>
                <td>${r.nr_startowy || '-'}</td>
                <td>${r.imie} ${r.nazwisko}</td>
                <td>${r.rocznik || '-'}</td>
                <td>${r.czas_biegu_format || '-'}</td>
                <td>${r.numer_biegu || '-'}</td>
                <td>${r.miejsce_w_biegu || '-'}</td>
                <td><span class="status-badge status-pk">PK</span></td>
            </tr>`;
        }
        
        // ============================================================
        // INNI (DNF, DQ, DNS)
        // ============================================================
        for (const r of inni) {
            let statusClass = '';
            if (r.status === 'DNF') statusClass = 'status-dnf';
            else if (r.status === 'DQ') statusClass = 'status-dq';
            else if (r.status === 'DNS') statusClass = 'status-dns';
            html += `<tr>
                <td class="position-cell">${r.status}</td>
                <td>${r.nr_startowy || '-'}</td>
                <td>${r.imie} ${r.nazwisko}</td>
                <td>${r.rocznik || '-'}</td>
                <td>${r.czas_biegu_format || '-'}</td>
                <td>${r.numer_biegu || '-'}</td>
                <td>${r.miejsce_w_biegu || '-'}</td>
                <td><span class="status-badge ${statusClass}">${r.status}</span></td>
            </tr>`;
        }
        
        html += `</tbody></table></div>`;
    }
    container.innerHTML = html;
    addLog(`✅ Załadowano ${allResults.length} wyników biegowych`, 'success');
    
    // Obsługa przycisków zamykania konkurencji
    document.querySelectorAll('#rankingContainer .close-competition-btn:not([disabled])').forEach(btn => {
        btn.addEventListener('click', async (e) => {
            const konkurencja = btn.getAttribute('data-konkurencja');
            const kategoria = btn.getAttribute('data-kategoria');
            if (confirm(`Czy na pewno chcesz zakończyć konkurencję: ${konkurencja} - ${kategoria}? Wszystkie protokoły dla tej konkurencji zostaną zamknięte.`)) {
                await setZakonczoneBiegi(konkurencja, kategoria);
            }
        });
    });
}

async function loadTechnicalResults() {
    const container = document.getElementById('techContainer');
    if (!container) return;
    container.innerHTML = '<div class="loading">⏳ Ładowanie protokołów technicznych...</div>';
    
    const snapshot = await database.ref('protokoly_techniczne').once('value');
    const data = snapshot.val();
    if (!data || Object.keys(data).length === 0) {
        container.innerHTML = '<div class="card">📭 Brak protokołów technicznych.</div>';
        return;
    }
    
    const zawodnicySnap = await database.ref('zawodnicy').once('value');
    const zawodnicyData = zawodnicySnap.val() || {};
    
    // ===== FUNKCJA PORÓWNUJĄCA Z EX AEQUO (z pliku spikera) =====
    function compareTechnicalResults(a, b) {
        const diff = (b.najlepszy || 0) - (a.najlepszy || 0);
        if (diff !== 0) return diff;
        
        const probyA = a.wszystkie_proby || [];
        const probyB = b.wszystkie_proby || [];
        
        const maxDlugosc = Math.max(probyA.length, probyB.length);
        for (let i = 0; i < maxDlugosc; i++) {
            const valA = probyA[i] || 0;
            const valB = probyB[i] || 0;
            if (valB !== valA) {
                return valB - valA;
            }
        }
        
        // Całkowity remis - ex aequo
        return 0;
    }
    
    // Zbieramy wszystkie wyniki
    const allTechnical = [];
    for (const [protocolId, protocol] of Object.entries(data)) {
        if (!protocol.zawodnicy) continue;
        const konkurencja = protocol.konkurencja || '?';
        const kategoria = protocol.kategoria || '?';
        const zakonczone = protocol.zakonczone === true;
        
        for (const [nr, zawodnik] of Object.entries(protocol.zawodnicy)) {
            const pelneDane = zawodnicyData[zawodnik.id] || {};
            const imie = pelneDane.imie || zawodnik.imie || '';
            const nazwisko = pelneDane.nazwisko || zawodnik.nazwisko || '';
            const rocznik = pelneDane.rocznik || zawodnik.rocznik || '';
            const pelnaKategoria = pelneDane.pelna_kategoria || zawodnik.kategoria || '';
            
            const najlepszyRaw = zawodnik.najlepszy;
            let najlepszy = null;
            if (najlepszyRaw !== undefined && najlepszyRaw !== null && najlepszyRaw !== '') {
                najlepszy = parseFloat(najlepszyRaw);
            }
            const isPk = zawodnik.pk === true;
            
            // ===== ZBIERAMY WSZYSTKIE PRÓBY (do porównywania ex aequo) =====
            const wszystkieProby = (zawodnik.wyniki || [])
                .filter(v => v && v !== 'x' && !isNaN(parseFloat(v)))
                .map(v => parseFloat(v))
                .sort((a, b) => b - a);
            
            allTechnical.push({
                konkurencja, kategoria,
                nr_startowy: zawodnik.nr_startowy || nr,
                imie, nazwisko, rocznik, pelna_kategoria: pelnaKategoria,
                najlepszy, isPk,
                wszystkie_proby: wszystkieProby,  // <-- DODANE dla ex aequo
                protocolId: protocolId,
                zakonczone: zakonczone
            });
        }
    }
    
    if (allTechnical.length === 0) {
        container.innerHTML = '<div class="card">📭 Brak wyników w protokołach technicznych.</div>';
        return;
    }
    
    // Grupowanie po konkurencji i kategorii
    const groups = {};
    for (const r of allTechnical) {
        const key = `${r.konkurencja}_${r.kategoria}`;
        if (!groups[key]) groups[key] = [];
        groups[key].push(r);
    }
    
    let html = '';
    for (const [key, results] of Object.entries(groups)) {
        const [konkurencja, kategoria] = key.split('_');
        const isZakonczone = results.some(r => r.zakonczone === true);
        
        // Podział na grupy: normalni (nie PK) i PK
        const normalni = results.filter(r => !r.isPk);
        const pkZWynikiem = results.filter(r => r.isPk && r.najlepszy !== null);
        const pkBezWyniku = results.filter(r => r.isPk && r.najlepszy === null);
        
        // ===== SORTOWANIE Z UWZGLĘDNIENIEM EX AEQUO (z pliku spikera) =====
        normalni.sort(compareTechnicalResults);
        pkZWynikiem.sort(compareTechnicalResults);
        
        // ===== PRZYZNAWANIE MIEJSC Z EX AEQUO =====
        let position = 1;
        let i = 0;
        while (i < normalni.length) {
            let j = i;
            // Znajdź grupę zawodników z identycznymi wynikami
            while (j < normalni.length - 1 && 
                   normalni[j].najlepszy === normalni[j+1].najlepszy &&
                   JSON.stringify(normalni[j].wszystkie_proby || []) === JSON.stringify(normalni[j+1].wszystkie_proby || [])) {
                j++;
            }
            const count = j - i + 1;
            for (let k = i; k <= j; k++) {
                normalni[k].pozycja = position;
                normalni[k].ex_aequo = count > 1;
            }
            position += count;
            i = j + 1;
        }
        
        // PK nie otrzymują pozycji
        for (const r of pkZWynikiem) r.pozycja = null;
        for (const r of pkBezWyniku) r.pozycja = null;
        
        // Generuj unikalny ID dla selecta jednostki
        const selectId = `unit_${key.replace(/[^a-zA-Z0-9]/g, '_')}`;
        let savedUnit = localStorage.getItem(`unit_${key}`);
        if (!savedUnit) savedUnit = 'm';
        
        html += `<div class="card" style="margin-top:20px;" data-group-key="${key}">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
                <h3>${konkurencja} - ${kategoria} ${isZakonczone ? '🔒' : ''}</h3>
                <div style="margin: 10px 0;">
                    <label>Jednostka: </label>
                    <select class="unit-select" data-group-key="${key}" id="${selectId}">
                        <option value="m" ${savedUnit === 'm' ? 'selected' : ''}>metry (m)</option>
                        <option value="cm" ${savedUnit === 'cm' ? 'selected' : ''}>centymetry (cm)</option>
                    </select>
                </div>
            </div>
            ${isZakonczone ? `<div class="info-note" style="background:#d4edda;">🔒 Konkurencja została zakończona przez sędziego technicznego.</div>` : ''}
            <table class="ranking-table" style="width:100%; border-collapse:collapse;">
                <thead><tr><th>Poz.</th><th>Nr</th><th>Zawodnik</th><th>Rocznik</th><th>Kategoria</th><th>Wynik</th></tr></thead>
                <tbody id="tbody_${key.replace(/[^a-zA-Z0-9]/g, '_')}">`;
        
        // Funkcja pomocnicza do formatowania wyniku (z jednostką)
        function formatWynik(wartosc, jednostka) {
            if (wartosc === null) return '—';
            if (jednostka === 'cm') return (wartosc).toFixed(0) + ' cm';
            return wartosc.toFixed(2) + ' m';
        }
        
        // Dodajemy wiersze
        const addRow = (r, isPkFlag) => {
            // ===== Wyświetlanie ex aequo =====
            let pozycjaDisplay = '';
            if (r.pozycja !== null) {
                pozycjaDisplay = r.ex_aequo ? `${r.pozycja}=` : `${r.pozycja}`;

            let wynikLabel = '';
            if (isPkFlag) {
                wynikLabel = r.najlepszy !== null ? formatWynik(r.najlepszy, savedUnit) + ' (PK)' : 'PK';
            } else {
                wynikLabel = r.najlepszy !== null ? formatWynik(r.najlepszy, savedUnit) : '—';
            }
            
            let rowClass = '';
            if (r.pozycja === 1) rowClass = 'position-1';
            else if (r.pozycja === 2) rowClass = 'position-2';
            else if (r.pozycja === 3) rowClass = 'position-3';
            
            html += `<tr class="${rowClass}" data-wartosc="${r.najlepszy !== null ? r.najlepszy : ''}" data-pk="${isPkFlag}">
                <td class="position-cell">${pozycjaDisplay}</td>
                <td>${r.nr_startowy || '-'}</td>
                <td><strong>${r.imie} ${r.nazwisko}</strong></td>
                <td>${r.rocznik || '-'}</td>
                <td>${r.pelna_kategoria || '-'}</td>
                <td class="wynik-cell">${wynikLabel}</td>
            </tr>`;
        };
        
        for (const r of normalni) addRow(r, false);
        for (const r of pkZWynikiem) addRow(r, true);
        for (const r of pkBezWyniku) addRow(r, true);
        
        html += `</tbody></table></div>`;
    }
    container.innerHTML = html;
    
    // Obsługa zmiany jednostki dla każdej grupy
    document.querySelectorAll('.unit-select').forEach(select => {
        select.addEventListener('change', (e) => {
            const groupKey = select.getAttribute('data-group-key');
            const newUnit = select.value;
            localStorage.setItem(`unit_${groupKey}`, newUnit);
            const card = select.closest('.card');
            const tbody = card.querySelector('tbody');
            const rows = tbody.querySelectorAll('tr');
            rows.forEach(row => {
                const wartosc = row.getAttribute('data-wartosc');
                const isPk = row.getAttribute('data-pk') === 'true';
                const wynikCell = row.querySelector('.wynik-cell');
                if (wartosc && wartosc !== '') {
                    const num = parseFloat(wartosc);
                    if (newUnit === 'cm') {
                        wynikCell.innerText = (num).toFixed(0) + ' cm' + (isPk ? ' (PK)' : '');
                    } else {
                        wynikCell.innerText = num.toFixed(2) + ' m' + (isPk ? ' (PK)' : '');
                    }
                } else {
                    if (isPk) wynikCell.innerText = 'PK';
                    else wynikCell.innerText = '—';
                }
            });
        });
    });
    
    addLog(`✅ Załadowano ${allTechnical.length} wyników technicznych`, 'success');
}

	function printTechnicalResults() {

		if (!container || !container.innerHTML || container.innerHTML.includes('Ładowanie')) {
			addLog('❌ Brak wyników do wydrukowania', 'error');
			return;
		}
		const printContent = container.cloneNode(true);
		// Zastąp selecty etykietą z wybraną jednostką
		printContent.querySelectorAll('.unit-select').forEach(select => {
			const selectedText = select.options[select.selectedIndex].text;
			const parent = select.closest('div');
			const labelSpan = document.createElement('span');
			labelSpan.innerHTML = `<strong>Jednostka:</strong> ${selectedText}`;
			select.replaceWith(labelSpan);

		const buttons = printContent.querySelectorAll('button');

		`);
		printWindow.document.close();
		printWindow.print();
	}
		document.getElementById('loginBtn').addEventListener('click', login);

			btn.addEventListener('click', () => { const view = btn.getAttribute('data-view'); if (view) showView(view); });
		});
		document.getElementById('loginEmail').addEventListener('keypress', (e) => { if (e.key === 'Enter') login(); });
		document.getElementById('loginPassword').addEventListener('keypress', (e) => { if (e.key === 'Enter') login(); });
		
		setTimeout(() => showView('mappingKonkurencji'), 100);
		</script>
